services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: aos
      POSTGRES_PASSWORD: aos
      POSTGRES_DB: adaptive_os
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
